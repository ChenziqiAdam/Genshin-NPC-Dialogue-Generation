### Model
model_name_or_path: Qwen/Qwen3-8B
stage: sft
do_train: true
finetuning_type: lora

### LoRA
lora_rank: 64
lora_alpha: 128
lora_target: all

### Dataset
dataset: zhongli_sft
template: qwen
val_size: 0.05

### Training
num_train_epochs: 5
per_device_train_batch_size: 4
gradient_accumulation_steps: 2
learning_rate: 2.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
max_length: 2048

### Multi-GPU (uncomment if using multiple GPUs)
# deepspeed: examples/deepspeed/ds_z2_config.json

### Logging & Saving
logging_steps: 10
save_steps: 100
eval_steps: 100
output_dir: ./output/zhongli_lora
report_to: none
